spring:
  application:
    name: WingLoan

  # PostgreSQL (Supabase) for production
  datasource:
    url: jdbc:postgresql://${DB_HOST:db.wxjvohtdhacqqqyrlvra.supabase.co}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:WingLoan2024SecureSecretKey_VeryLongSecretForHS512Algorithm_AtLeast64BytesRequired!}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.smartloan: INFO
    org.springframework: WARN

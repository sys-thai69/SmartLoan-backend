spring.application.name=SmartLoan

# Server Configuration
server.port=${SERVER_PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:D02uPXeGZdhMoM4seYcjWjl2HrARxcAmrVjfmFr4XWI=}
jwt.expiration=86400000

# Database Configuration (Supabase)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.pool-name=SmartLoanHikariCP 
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-init-sql=SELECT 1

# PostgreSQL connection properties
spring.datasource.hikari.data-source-properties.stringtype=unspecified

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repairOnMigrate=false
spring.flyway.validateOnMigrate=false
spring.flyway.out-of-order=false
spring.flyway.enabled=false

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:3001

# AI Configuration (Optional)
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Firebase Configuration
# Option 1: Path to service account JSON file (for local dev)
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}
# Option 2: Service account JSON as string (for Render/Vercel - set as env var)
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON:}

# Admin Bootstrap Key
admin.bootstrap.key=${ADMIN_BOOTSTRAP_KEY:}

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.from=${MAIL_FROM:noreply@smartloan.com}

# Logging Configuration
logging.level.root=WARN
logging.level.com.smartloan=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Production Mode - Send real emails via Gmail
mail.dev-mode=false

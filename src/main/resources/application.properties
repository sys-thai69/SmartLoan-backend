spring.application.name=SmartLoan

# Server Configuration
server.port=${PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Database Configuration (Supabase)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=SmartLoanHikariCP
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:3001

# AI Configuration (Optional)
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Firebase Configuration
# Option 1: Path to service account JSON file (for local dev)
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}
# Option 2: Service account JSON as string (for Render/Vercel - set as env var)
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON:}

# Logging Configuration
logging.level.root=WARN
logging.level.com.smartloan=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

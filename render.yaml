# Render Blueprint - WingLoan Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: wingloan-backend
    runtime: docker
    region: singapore  # Closest to your Supabase (ap-southeast-1)
    plan: free  # Or starter, standard, etc.
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: JWT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: DB_URL
        sync: false  # Set manually in Render dashboard
      - key: DB_USERNAME
        sync: false  # Set manually in Render dashboard
      - key: DB_PASSWORD
        sync: false  # Set manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false  # Optional - set if using AI features
